apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: java-app
  namespace: apps
  labels:
    app: java-app
    release: kube-prometheus
spec:
  selector:
    matchLabels:
      app: java-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
